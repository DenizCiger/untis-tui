name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            source_binary_name: untis-tui.exe
            packaged_binary_name: untis.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.source_binary_name }}" "dist/${{ matrix.packaged_binary_name }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -C dist -czf "untis-${{ matrix.target }}.tar.gz" "${{ matrix.packaged_binary_name }}"
          else
            cd dist
            powershell.exe -NoProfile -Command "Compress-Archive -Path '${{ matrix.packaged_binary_name }}' -DestinationPath '../untis-${{ matrix.target }}.zip' -Force"
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            untis-${{ matrix.target }}.${{ matrix.archive }}
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
