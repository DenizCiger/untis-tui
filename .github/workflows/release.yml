name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            source_binary_name: untis-tui
            packaged_binary_name: untis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            source_binary_name: untis-tui.exe
            packaged_binary_name: untis.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.source_binary_name }}" "dist/${{ matrix.packaged_binary_name }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -C dist -czf "untis-${{ matrix.target }}.tar.gz" "${{ matrix.packaged_binary_name }}"
          else
            cd dist
            powershell.exe -NoProfile -Command "Compress-Archive -Path '${{ matrix.packaged_binary_name }}' -DestinationPath '../untis-${{ matrix.target }}.zip' -Force"
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            untis-${{ matrix.target }}.${{ matrix.archive }}
          generate_release_notes: true
